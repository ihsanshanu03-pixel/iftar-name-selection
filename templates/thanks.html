{% load static %}
<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-image:url("{% static 'images/ifthar.jpg' %}");
background-size:cover;
background-position:center;
padding:20px;
}

/* dark overlay */

body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
}

/* card */

.box{
position:relative;
z-index:2;
background:rgba(255,255,255,0.95);
padding:40px;
border-radius:12px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
max-width:400px;
width:100%;
}

h1{
color:#d4af37;
margin-bottom:15px;
font-size:28px;
}

p{
color:#444;
margin-bottom:20px;
}

a{
display:inline-block;
margin-top:20px;
text-decoration:none;
background:#d4af37;
color:white;
padding:12px 22px;
border-radius:6px;
transition:0.3s;
}

a:hover{
background:#b8962e;
}

/* gold confetti */

.confetti{
position:fixed;
width:8px;
height:8px;
background:#d4af37;
top:-10px;
z-index:1;
animation:fall linear forwards;
}

@keyframes fall{

0%{
transform:translateY(0) rotate(0);
opacity:1;
}

100%{
transform:translateY(100vh) rotate(720deg);
opacity:0;
}

}

/* responsive */

@media (max-width:480px){

.box{
padding:25px;
}

h1{
font-size:22px;
}

}

</style>

</head>

<body>

<div class="box">

<h1>🌙 Thank You!</h1>

<p>Your Iftar registration has been submitted successfully.</p>

<a href="/">Register Another</a>

</div>

<script>

/* gold celebration popper */

function popper(){

for(let i=0;i<120;i++){

let confetti=document.createElement("div");

confetti.className="confetti";

confetti.style.left=Math.random()*100+"vw";
confetti.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(confetti);

setTimeout(()=>{
confetti.remove();
},5000);

}

}

popper();

</script>

</body>
</html>
