{% load static %}
<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Iftar Registration</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-image:url("{% static 'images/ifthar.jpg' %}");
background-size:cover;
background-position:center;
padding:20px;
}

/* overlay */

body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
z-index:0;
}

/* card */

.box{
position:relative;
z-index:1;
background:rgba(255,255,255,0.95);
padding:40px;
width:100%;
max-width:400px;
border-radius:12px;
box-shadow:0 10px 35px rgba(0,0,0,0.5);
}

/* title */

h2{
text-align:center;
margin-bottom:25px;
color:#8b5e00;
font-size:24px;
}

/* labels */

label{
font-weight:bold;
display:block;
margin-top:15px;
color:#333;
}

/* inputs */

input{
width:100%;
padding:12px;
margin-top:6px;
border-radius:6px;
border:1px solid #d4af37;
font-size:15px;
}

/* button */

button{
margin-top:25px;
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#d4af37;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#b8962e;
}

.success{
background:#fff8e1;
padding:10px;
border-radius:6px;
margin-bottom:10px;
text-align:center;
color:#8b5e00;
}

/* MOBILE */

@media (max-width:480px){

.box{
padding:25px;
}

h2{
font-size:20px;
}

input{
font-size:14px;
}

button{
font-size:15px;
}

}

</style>
</head>

<body>

<div class="box">

<h2>Kalakkan CT Iftar Name Selection</h2>

{% if message %}
<div class="success">
{{ message }}
</div>
{% endif %}

<form method="post">
{% csrf_token %}

<label>Enter Your Name</label>
{{ form.person_name }}

<label>Iftar Name</label>
{{ form.iftar_name }}

<button type="submit">Register</button>

</form>

</div>

</body>
</html>
